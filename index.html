<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Compatibilité Municipales Marseille 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg,#f4f6f9,#e9eef5);
    margin: 0;
    padding: 20px;
    color: #222;
}
.container {
    max-width: 950px;
    margin: auto;
    background: white;
    padding: 40px;
    border-radius: 14px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
}
h1 {
    text-align: center;
    margin-bottom: 10px;
}
.subtitle {
    text-align:center;
    margin-bottom:30px;
    color:#555;
}
.question {
    margin-bottom: 28px;
}
label {
    font-weight: 600;
    display:block;
    margin-bottom:10px;
}
.scale {
    display:flex;
    justify-content:space-between;
    font-size:12px;
    color:#777;
    margin-top:6px;
}
input[type=range] {
    width:100%;
    height:6px;
    appearance:none;
    background:#ddd;
    border-radius:5px;
    outline:none;
}
input[type=range]::-webkit-slider-thumb {
    appearance:none;
    width:18px;
    height:18px;
    border-radius:50%;
    background:#111;
    cursor:pointer;
}
button {
    width:100%;
    padding:18px;
    font-size:18px;
    font-weight:bold;
    background:#111;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-top:20px;
}
button:hover { background:#333; }
.result { margin-top:40px; }
.card {
    padding:18px;
    border-radius:10px;
    margin-bottom:12px;
    background:#f3f5f9;
}
.progress {
    height:10px;
    background:#ddd;
    border-radius:5px;
    margin-top:8px;
}
.progress-bar {
    height:10px;
    border-radius:5px;
}
.explanation {
    margin-top:25px;
    padding:20px;
    background:#eef2f7;
    border-radius:12px;
}
</style>
</head>
<body>

<div class="container">
<h1>Test de compatibilité politique – Marseille 2026</h1>
<p class="subtitle">Note chaque affirmation de 1 (Pas du tout d'accord) à 5 (Totalement d'accord)</p>

<form id="quiz"></form>
<button onclick="calculate()">Voir mon résultat</button>

<div id="result" class="result"></div>
</div>

<script>

const questions = [
"Il faut augmenter fortement la police municipale.",
"La vidéosurveillance doit être massivement étendue.",
"La propreté doit être la priorité n°1 du mandat.",
"Les amendes pour incivilités doivent être fortement augmentées.",
"La mairie doit fonctionner comme une entreprise efficace.",
"Il faut réduire les subventions aux associations inefficaces.",
"La transition écologique doit être une priorité majeure.",
"La sécurité doit passer avant l’écologie.",
"Il faut plus de logements sociaux.",
"La mairie doit être ferme avec les commerces en infraction.",
"La dette peut augmenter si les investissements sont utiles.",
"La ville doit réduire la place de la voiture.",
"La police municipale doit être armée.",
"La mairie doit être clivante si nécessaire.",
"La priorité doit aller aux quartiers défavorisés.",
"Il faut plus de concertation citoyenne.",
"La mairie doit restructurer ses services.",
"La lutte contre le clientélisme est prioritaire.",
"Il faut fermer administrativement les établissements problématiques.",
"La mairie doit coopérer étroitement avec l’État.",
"Il faut plus de sanctions rapides.",
"La tolérance zéro doit s’appliquer aux incivilités.",
"La fiscalité locale doit être réduite.",
"La ville doit développer massivement les pistes cyclables.",
"La gestion doit être technique avant d’être politique.",
"Il faut investir massivement dans la rénovation des écoles.",
"La priorité est l’ordre urbain.",
"La mairie doit être consensuelle.",
"Il faut limiter Airbnb.",
"Les transports devraient être quasi gratuits.",
"La mairie doit communiquer davantage.",
"La ville doit attirer des investissements privés.",
"La présence policière doit être visible partout.",
"La mairie doit réduire les dépenses publiques.",
"Il faut renforcer la vidéoprotection dans tous les quartiers.",
"Les incivilités doivent être verbalisées systématiquement.",
"Il faut privilégier la prévention sociale plutôt que la répression.",
"La mairie doit imposer des décisions même impopulaires.",
"La priorité est la qualité de vie quotidienne.",
"Le leadership municipal doit être autoritaire."
];

// Profils simplifiés pour fun entre potes
const profiles = {
"Martine Vassal": [5,5,5,4,4,4,2,4,2,4,3,2,5,4,2,2,4,4,5,5,4,4,3,2,4,3,5,2,3,2,3,4,4,4,5,5,2,4,5,4],
"Franck Allisio": [5,5,5,5,4,5,1,5,1,5,2,1,5,5,1,1,3,5,5,3,5,5,3,1,3,2,5,1,2,1,2,3,5,4,5,5,1,5,5,5],
"Benoît Payan": [4,3,4,3,3,2,4,3,4,3,4,3,3,2,4,4,3,4,3,4,3,3,2,4,3,5,3,4,4,3,4,3,3,3,3,3,4,2,4,2],
"Sébastien Delogu": [2,1,3,2,2,1,5,2,5,2,4,4,1,2,5,5,2,3,2,3,2,2,2,5,2,4,2,5,4,4,3,2,2,2,2,2,5,2,3,1]
};

const explanations = {
"Martine Vassal":"Tu privilégies une gestion ferme, structurée et orientée ordre urbain avec cadre institutionnel solide.",
"Franck Allisio":"Tu privilégies la rupture et l’autorité forte avec une ligne sécuritaire assumée.",
"Benoît Payan":"Tu privilégies la continuité administrative et une approche plus équilibrée entre social et gestion.",
"Sébastien Delogu":"Tu privilégies redistribution, inclusion et participation citoyenne avant la coercition."
};

function renderQuestions() {
    const quiz = document.getElementById("quiz");
    questions.forEach((q, i) => {
        quiz.innerHTML += `
            <div class="question">
                <label>${i+1}. ${q}</label>
                <input type="range" min="1" max="5" value="3" name="q${i}">
                <div class="scale">
                    <span>1<br>Pas du tout</span>
                    <span>2</span>
                    <span>3</span>
                    <span>4</span>
                    <span>5<br>Totalement</span>
                </div>
            </div>
        `;
    });
}

function calculate() {
    const form = document.forms["quiz"];
    let answers = [];
    for (let i=0;i<questions.length;i++){
        answers.push(parseInt(form["q"+i].value));
    }

    let scores={};

    for (let candidate in profiles){
        let diff=0;
        for(let i=0;i<answers.length;i++){
            diff+=Math.abs(answers[i]-profiles[candidate][i]);
        }
        let maxDiff=4*questions.length;
        let percent=100-Math.round((diff/maxDiff)*100);
        scores[candidate]=percent;
    }

    let sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);

    let resultHTML="<h2>Classement de compatibilité :</h2>";

    sorted.forEach(([name,percent],index)=>{
        resultHTML+=`
        <div class="card">
            <strong>${index+1}. ${name}</strong> — ${percent}%
            <div class="progress">
                <div class="progress-bar" style="width:${percent}%; background:${index==0?'#111':'#999'};"></div>
            </div>
        </div>`;
    });

    resultHTML+=`
    <div class="explanation">
        <h3>Analyse personnalisée</h3>
        <p>${explanations[sorted[0][0]]}</p>
    </div>`;

    document.getElementById("result").innerHTML=resultHTML;
}

renderQuestions();

</script>

</body>
</html>
